name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: PYTHONPATH=src pytest tests/ -v

  e2e:
    runs-on: ubuntu-latest
    needs: [unit]
    env:
      DATABASE_URL: postgresql+asyncpg://auction:auction@localhost:5432/auction
      REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction
          POSTGRES_DB: auction
        options: >-
          --health-cmd "pg_isready -U auction"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
      - name: Start server
        run: |
          PYTHONPATH=src uvicorn auction_app.main:create_app --factory --host 0.0.0.0 --port 8010 &
          echo $! > /tmp/server.pid
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8010/healthz && echo Server ready && exit 0
            sleep 1
          done
          echo Server did not become ready && exit 1
      - name: Run acceptance tests
        run: API_BASE_URL=http://localhost:8010 pytest verify/acceptance/ -v
      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true
