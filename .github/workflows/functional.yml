name: Functional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functional:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction
          POSTGRES_DB: auction
        options: >-
          --health-cmd "pg_isready -U auction"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://auction:auction@localhost:5432/auction
          REDIS_URL: redis://localhost:6379/0
      - name: Start server
        run: |
          uvicorn auction_app.main:create_app --factory --host 0.0.0.0 --port 8010 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8010/healthz > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8010/healthz || { echo "Server failed to start"; exit 1; }
        env:
          DATABASE_URL: postgresql+asyncpg://auction:auction@localhost:5432/auction
          REDIS_URL: redis://localhost:6379/0
      - name: Acceptance tests
        run: API_BASE_URL=http://localhost:8010 pytest verify/acceptance/ -v
      - name: Stop server
        if: always()
        run: kill $(lsof -t -i:8010) 2>/dev/null || true
